<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Add Link</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="form-container">

        <form id="linkForm"
        class="link-form">

            <h1>Add New Link</h1>

            <input
            type="text"
            id="title"
            placeholder="Title"
            required>

            <textarea
            id="description"
            placeholder="Description"
            required></textarea>

            <input
            type="text"
            id="url"
            placeholder="URL"
            required>

            <input
                type="file"
                id="thumbnail">

            <input
            type="text"
            id="type"
            placeholder="Type">

            <input
            type="text"
            id="tags"
            placeholder="tags example: design,training">

            <button type="submit">

                Add Link

            </button>

        </form>

    </div>

    <script src="add-link.js"></script>

</body>

</html>
